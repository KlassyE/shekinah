---
deployment:
  tasks:
    # Document Root of the shekinah.ac.ug addon domain (from cPanel > Domains).
    # If cPanel shows the Document Root as "public_html/shekinah.ac.ug" instead,
    # change this to /home/calidadadmin/public_html/shekinah.ac.ug/
    - export DEPLOYPATH=/home/calidadadmin/shekinah.ac.ug/
    - /bin/mkdir -p $DEPLOYPATH
    # Copy the pre-built site (the contents of dist/) into the domain root.
    - /bin/cp -R dist/. $DEPLOYPATH
